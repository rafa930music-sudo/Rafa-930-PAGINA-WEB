    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;

    body {
      background: #000000;
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;

      position: relative;
      overflow-x: hidden;

    /* ========== SPLASH SCREEN PREMIUM ========== */
    .splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000;
      z-index: 10000;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: opacity 0.8s cubic-bezier(0.2, 0.9, 0.4, 1.1), visibility 0.8s ease;
      pointer-events: none;
    }
    
    .splash.hidden {
      opacity: 0;
      visibility: hidden;
    }
    
    .splash-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    
    .splash-logo {
      position: relative;
      z-index: 10;
      width: min(240px, 50vw);
      height: min(240px, 50vw);
      display: flex;
      justify-content: center;
      align-items: center;
      animation: splashPulse 1.2s ease-in-out infinite;
    }
    
    .splash-logo img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: brightness(0) invert(1);
    }
    
    @keyframes splashPulse {
      0% { transform: scale(0.92); opacity: 0.9; filter: drop-shadow(0 0 15px rgba(255,255,255,0.3)); }
      50% { transform: scale(1.08); opacity: 1; filter: drop-shadow(0 0 60px rgba(255,255,255,0.8)); }
      100% { transform: scale(0.92); opacity: 0.9; filter: drop-shadow(0 0 15px rgba(255,255,255,0.3)); }
    }

    /* ========== FONDO NEÓN ULTRA PREMIUM ========== */
    .neon-aura {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }
    
    .neon-aura::before {
      content: '';
      position: absolute;
      top: -30%;
      left: -20%;
      width: 140%;
      height: 140%;
      background: radial-gradient(circle at 30% 40%, rgba(255,255,255,0.15) 0%, rgba(0,0,0,0) 70%);
      animation: pulseNeonBg 7s infinite alternate;
    }
    
    .neon-aura::after {
      content: '';
      position: absolute;
      bottom: -30%;
      right: -20%;
      width: 140%;
      height: 140%;
      background: radial-gradient(circle at 70% 60%, rgba(255,255,255,0.1) 0%, rgba(0,0,0,0) 70%);
      animation: pulseNeonBg2 9s infinite alternate-reverse;
    }
    
    @keyframes pulseNeonBg {
      0% { opacity: 0.2; transform: scale(1); }
      100% { opacity: 1; transform: scale(1.08); }
    }
    
    @keyframes pulseNeonBg2 {
      0% { opacity: 0.15; transform: scale(1); }
      100% { opacity: 0.8; transform: scale(1.1); }
    }
    
    /* Líneas de neón mejoradas */
    .neon-lines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }
    
    .neon-lines span {
      position: absolute;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      height: 2px;
      width: 100%;
      animation: slideNeon 10s linear infinite;
    }
    
    .neon-lines span:nth-child(1) { top: 15%; animation-delay: 0s; }
    .neon-lines span:nth-child(2) { top: 35%; animation-delay: -2.5s; opacity: 0.6; }
    .neon-lines span:nth-child(3) { top: 55%; animation-delay: -5s; opacity: 0.4; }
    .neon-lines span:nth-child(4) { top: 75%; animation-delay: -7.5s; opacity: 0.5; }
    .neon-lines span:nth-child(5) { top: 90%; animation-delay: -3s; opacity: 0.3; }
    
    @keyframes slideNeon {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Textura de grano premium */
    .noise {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 35px 35px;
      pointer-events: none;
      z-index: 0;
    }

    /* Contenedor principal - RESPONSIVE con clamp */
    .hub {
      width: 100%;
      max-width: min(560px, 95%);
      position: relative;
      z-index: 10;
    }

    /* Cabecera premium */
    .header {
      text-align: center;
      margin-bottom: clamp(24px, 6vh, 38px);
    }

    .avatar {

      height: clamp(75px, 20vw, 105px);
      margin: 0 auto clamp(12px, 3vh, 18px);
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(255,255,255,0.4);
      box-shadow: 0 0 30px rgba(255,255,255,0.3), 0 0 8px rgba(255,255,255,0.6);
      transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      cursor: pointer;
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale(100%);
      transition: filter 0.4s ease, transform 0.3s ease;
    }

    .avatar:hover {
      box-shadow: 0 0 50px rgba(255,255,255,0.6);
      border-color: rgba(255,255,255,0.7);
      transform: scale(1.02);
    }

    .avatar:hover img {
      filter: grayscale(0%);
      transform: scale(1.02);
    }

    h1 {

      margin-bottom: 6px;

    .link-btn {

      backdrop-filter: blur(16px);

      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.4, 1.2);
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .link-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;

      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);

    .link-btn:hover::before {

    .link-left {

    .link-left i {

    .arrow {

    }

    .social-icon:hover::after {
      opacity: 1;
      visibility: visible;
      transform: translateX(-50%) translateY(0);
    }

    /* Footer premium - RESPONSIVE */
    .footer {

    .footer a {

    .footer a:hover {

    .footer-line {

    .divider-dot {

    /* Animación de entrada mejorada */
    @keyframes fadeUpNeon {
      0% {
        opacity: 0;
        transform: translateY(30px);
        filter: blur(5px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);

      }
    }

    .animate {
      animation: fadeUpNeon 0.6s cubic-bezier(0.2, 0.9, 0.3, 1.15) forwards;
      opacity: 0;
    }

    .d1 { animation-delay: 0.05s; }
    .d2 { animation-delay: 0.12s; }
    .d3 { animation-delay: 0.19s; }
    .d4 { animation-delay: 0.26s; }
    .d5 { animation-delay: 0.33s; }

    /* Ajustes para pantallas muy pequeñas */
    @media (max-width: 380px) {

        gap: 8px;

      .link-left i {
        width: 22px;

      .footer {

      }
      .divider-dot {

    /* Ajustes para landscape en móviles */
    @media (max-height: 600px) and (orientation: landscape) {

      }
    }

    /* Prevenir selección no deseada */
    .link-btn, .social-icon, .footer a {
      -webkit-tap-highlight-color: transparent;
    }
  </style>

<script>
  // ========== SPLASH SCREEN CON MÁS PARTÍCULAS ==========
  (function() {
    const splash = document.getElementById('splash');
    const canvas = document.getElementById('splashCanvas');
    if (!canvas || !splash) return;
    
    let ctx = canvas.getContext('2d');
    let particles = [];
    let animationId;
    let splashActive = true;
    
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    
    function createParticles() {
      const particleCount = Math.min(280, Math.floor(window.innerWidth / 5) + 60);
      particles = [];
      for (let i = 0; i < particleCount; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 2.5 + 0.5,
          alpha: Math.random() * 0.5 + 0.1,
          vx: (Math.random() - 0.5) * 0.6,
          vy: (Math.random() - 0.5) * 0.6
        });
      }
    }
    
    function drawParticles() {
      if (!ctx || !splashActive) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      for (let p of particles) {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
        ctx.fill();
        
        p.x += p.vx;
        p.y += p.vy;
        
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;
      }
      
      animationId = requestAnimationFrame(drawParticles);
    }
    
    function initSplash() {
      resizeCanvas();
      createParticles();
      drawParticles();
      
      setTimeout(() => {
        if (splash) {
          splash.classList.add('hidden');
          splashActive = false;
          setTimeout(() => {
            if (animationId) cancelAnimationFrame(animationId);
            if (canvas) canvas.style.display = 'none';
          }, 800);
        }
      }, 2500);
    }
    
    window.addEventListener('resize', () => {
      if (splash && !splash.classList.contains('hidden') && splashActive) {
        resizeCanvas();
        createParticles();
      }
    });
    
    initSplash();
  })();

  // ========== EFECTO DE BRILLO DINÁMICO EN BOTONES ==========
  document.querySelectorAll('.link-btn').forEach(btn => {
    btn.addEventListener('mousemove', (e) => {
      const rect = btn.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;
      btn.style.setProperty('--x', `${x}%`);
      btn.style.setProperty('--y', `${y}%`);

  // Pequeña animación de entrada para los tooltips en móvil (feedback táctil)
  const socialIcons = document.querySelectorAll('.social-icon');
